name: RSA 2048 Public Key With Large Public Exponent
comment: |-
  Real-world pathological RSA public key whose public exponent E exceeds the
  historical 32-bit cap (here ~1397 bits, comparable to the keys observed in
  the wild by zmap/zgrab2 and runZero). Verifies sshamble can parse, fingerprint,
  and round-trip RSA keys with arbitrarily large E through excrypto.
  See: https://github.com/runZeroInc/excrypto/pull/78 and https://github.com/zmap/zgrab2/pull/714
keyType: rsa
